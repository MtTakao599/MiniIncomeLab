<article class="card">
  <div class="card-header">
    <span class="category">{{ category }}</span>
    <h2>{{ name }}</h2>
    <div class="rating">おすすめ度: {{ rating }} / 5</div>
  </div>

  {{ product_specs }}

  <div class="note-block">
    <strong>向いている用途</strong>
    {{ use_case }}
  </div>

  <div class="note-block">
    <strong>メリット</strong>
    {{ pros }}
  </div>

  <div class="note-block">
    <strong>注意点</strong>
    {{ cons }}
  </div>

  <div class="links">
    {{ product_links }}
  </div>

  <div class="last-checked">最終確認日: {{ last_checked }}</div>
</article>
